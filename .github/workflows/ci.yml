name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint main script
        run: shellcheck -x -s bash -S warning flap
      - name: Lint test infrastructure
        run: shellcheck -x -s bash -S warning tests/run-tests.sh tests/lib.sh
      - name: Lint test suites
        run: shellcheck -x -s bash -S warning tests/test-*.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: bash tests/run-tests.sh

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify VERSION file matches script
        run: |
          file_ver=$(cat VERSION)
          grep -q "^VERSION=\"${file_ver}\"$" flap || {
            echo "::error::VERSION file (${file_ver}) does not match flap script"
            exit 1
          }
